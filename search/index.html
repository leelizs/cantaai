<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070b18" />

    <title>CantaAI - Buscar música</title>

    <meta
      name="description"
      content="Busque músicas escrevendo errado, incompleto ou misturando artista com trecho da letra."
    />

    <link rel="stylesheet" href="./search.css" />
    <script src="./search.js" defer></script>
  </head>

  <body>
    <a class="skip-link" href="#conteudo-principal">Pular para o conteúdo</a>

    <main id="conteudo-principal" class="search-page">
      <a
        href="../home/"
        class="back-link"
        aria-label="Voltar para a página inicial"
      >
        ← Voltar
      </a>

      <section class="search-hero" aria-labelledby="search-title">
        <p class="search-hero__tag">Busca por texto</p>

        <h1 id="search-title" class="search-hero__title">
          Escreva do jeito que você lembra.
        </h1>

        <p class="search-hero__description">
          Pode escrever errado, incompleto ou misturar artista com trecho da
          música. O CantaAI tenta encontrar algo parecido.
        </p>
      </section>

      <form
        id="searchForm"
        class="search-box"
        role="search"
        aria-label="Buscar música por texto"
      >
        <label for="searchInput" class="sr-only">Buscar música</label>

        <input
          type="search"
          id="searchInput"
          name="q"
          maxlength="180"
          spellcheck="true"
          placeholder='Ex: "beatls yesterday", "blinding ligths", "bad gai"'
          autocomplete="off"
        />

        <button id="searchButton" type="submit">Buscar música</button>
      </form>

      <p id="status" class="status" role="status" aria-live="polite">
        Digite algo para começar.
      </p>

      <section
        id="results"
        class="results"
        aria-label="Resultados da busca"
        aria-live="polite"
      ></section>

      <noscript>
        <p class="noscript-warning">
          O CantaAI precisa de JavaScript ativado para buscar músicas.
        </p>
      </noscript>
    </main>
  </body>
</html>
